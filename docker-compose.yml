version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gorag
    ports:
      - "5434:5432"          # Using 5434 to avoid conflicts
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: